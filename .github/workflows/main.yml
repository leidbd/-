name: Build Android APK

# 触发条件：推送到 main 分支 或 手动触发
on:
  push:
    branches: [ main ]
  workflow_dispatch:    # 允许手动运行

jobs:
  build:
    runs-on: ubuntu-latest  # 必须用 Linux 环境

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 JDK（Android 常用 17）
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle  # 缓存 Gradle 依赖（提速）

    # 3. 赋予 gradlew 执行权限
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. 构建 Debug + Release APK
    - name: Build Debug & Release APK
      run: ./gradlew assembleDebug assembleRelease

    # 5. 上传 APK 到 GitHub（可下载）
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: APK-Build
        # 上传所有生成的 APK
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        retention-days: 30  # 保存30天
